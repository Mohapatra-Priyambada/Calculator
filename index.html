<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lets Calculate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">
    <div class="calculator-card">
        <div class="top-bar">
            <p>SmartCalc</p>
            <!-- toggle button for theme change  -->
            <label class="switch">
                <input type="checkbox">
                <!-- span for the container and innerslider -->
                 <span class="slider">
                    <!-- <span class="icon">
                        <img src="./assets/images/moon.png">
                    </span>
                    <span class="icon">
                        <img src="./assets/images/sun.png">
                    </span> -->
                 </span>
            </label>
        </div>
        <div>
            <div class="input-screen"><input type="text" id="input-screen"></div>
            <div class="input-buttons">
                <button>MC</button>
                <button>MR</button>
                <button>M-</button>
                <button>M+</button>
                <button>AC</button>
                <button>%</button>
                <button>x<sup>y</sup></button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>/</button>
                <button>-</button>
                <button>Inv</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>x</button>
                <button>.</button>
                <button>x<sup>2</sup></button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="big-button-v">+</button>
                <button class="big-button-v">=</button>
                <button>&#8508</button>
                <button class="big-button-h">0</button>
                <button>00</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
