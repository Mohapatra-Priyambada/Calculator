<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Calculate || Day to Calulation made easy</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="page-bg">
    <div class="calc-body">
        <div class="calc-top">
            <h2>Smart Calc</h2>
            <!-- Toggle button -->
            <div class="toggle-btn">
                <div class="toggle" id="themeToggle">
                    <div class="theme-icons">
                        <span class="sun"><img src="./assets/images/sun.png"></span>
                        <span class="moon"><img src="./assets/images/moon.png"></span>
                    </div>
                    <div class="circle"></div>
                </div>
            </div>
        </div>
        <div class="calculator-content">
            <div class="calculation-box">
                <input type="text" id="screen" value="0" autocomplete="off" >
                <div class="result-box">
                    <p></p>
                </div>
            </div>
            <div class="calculator-button">
                <button>Deg</button>
                <button>Rad</button>
                <button>x!</button>
                <button>&#40</button>
                <button>&#41</button>
                <button>%</button>
                <button>AC</button>
                <button>Inv</button>
                <button>sin</button>
                <button>In</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>/</button>
                <button>&pi;</button>
                <button>cos</button>
                <button>log</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>x</button>
                <button>e</button>
                <button>tan</button>
                <button>&radic;</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>-</button>
                <button>Ans</button>
                <button>EXP</button>
                <button>x<sup>y</sup></button>
                <button>0</button>
                <button>.</button>
                <button>=</button>
                <button>+</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
